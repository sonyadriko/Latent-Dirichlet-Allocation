<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Project - LDA News Trend</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/auth.js"></script>
</head>
<body>
    {% include "components/sidebar.html" %}

    <div class="dashboard">
        <!-- Main Content -->
        <main class="main-content">
            <div class="container">
                <!-- Header -->
                <header class="page-header">
                    <div class="header-content">
                        <h1>📁 Manajemen Project</h1>
                        <div class="header-actions">
                            <button class="btn-refresh" onclick="loadProjects()">🔄 Refresh</button>
                        </div>
                    </div>
                </header>

                <!-- Projects Table -->
                <div class="projects-section">
                    <div id="projects-table" class="projects-table">
                        <div class="projects-loading">Memuat projects...</div>
                    </div>
                </div>

                <!-- Documents Modal -->
                <div id="documents-modal" class="modal">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2 id="modal-project-name">📄 Dokumen Project</h2>
                            <button class="modal-close" onclick="closeDocumentsModal()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div id="documents-loading" class="documents-loading">Memuat dokumen...</div>
                            <div id="documents-list" class="documents-list"></div>
                            <div id="documents-empty" class="documents-empty" style="display: none;">
                                Belum ada dokumen dalam project ini.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load all projects
        async function loadProjects() {
            const container = document.getElementById('projects-table');

            try {
                container.innerHTML = '<div class="projects-loading">Memuat projects...</div>';
                const response = await apiRequest('/api/projects/');

                if (response.success) {
                    renderProjectsTable(response.data);
                } else {
                    container.innerHTML = `
                        <div class="projects-error">
                            <p>Gagal memuat projects: ${escapeHtml(response.message)}</p>
                            <button class="btn btn-secondary" onclick="loadProjects()">Coba Lagi</button>
                        </div>
                    `;
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="projects-error">
                        <p>Error: ${escapeHtml(error.message)}</p>
                        <button class="btn btn-secondary" onclick="loadProjects()">Coba Lagi</button>
                    </div>
                `;
            }
        }

        // Render projects table
        function renderProjectsTable(projects) {
            const container = document.getElementById('projects-table');

            if (!projects || projects.length === 0) {
                container.innerHTML = '<p class="projects-empty">Belum ada project. Buat project untuk memulai.</p>';
                return;
            }

            const headerHtml = `
                <div class="project-header">
                    <div>Nama Project</div>
                    <div class="project-stat-label">Topics</div>
                    <div class="project-stat-label">Documents</div>
                    <div class="project-stat-label">Coherence</div>
                    <div class="project-stat-label">Status</div>
                    <div>Aksi</div>
                </div>
            `;

            const rowsHtml = projects.map(project => `
                <div class="project-row" data-id="${project.id}">
                    <div>
                        <div class="project-name">${escapeHtml(project.name)}</div>
                        ${project.description ? `<div class="project-description">${escapeHtml(project.description)}</div>` : ''}
                    </div>
                    <div class="project-stat">
                        <div class="project-stat-value">${project.num_topics || 0}</div>
                        <div class="project-stat-label">Topics</div>
                    </div>
                    <div class="project-stat">
                        <div class="project-stat-value">${project.document_count || 0}</div>
                        <div class="project-stat-label">Docs</div>
                    </div>
                    <div class="project-stat">
                        <div class="project-stat-value">${(project.coherence_score || 0).toFixed(3)}</div>
                        <div class="project-stat-label">Cv Score</div>
                    </div>
                    <div>
                        <span class="project-status ${project.status || 'active'}">
                            ${project.status || 'active'}
                        </span>
                    </div>
                    <div class="project-actions">
                        <button class="btn-view-docs" onclick="viewDocuments(${project.id}, '${escapeHtml(project.name)}')">
                            📄 Dokumen
                        </button>
                        <button class="btn-delete" onclick="deleteProject(${project.id}, '${escapeHtml(project.name)}')">
                            🗑️ Hapus
                        </button>
                    </div>
                </div>
            `).join('');

            container.innerHTML = headerHtml + rowsHtml;
        }

        // View documents for a project
        async function viewDocuments(projectId, projectName) {
            const modal = document.getElementById('documents-modal');
            const documentsList = document.getElementById('documents-list');
            const documentsLoading = document.getElementById('documents-loading');
            const documentsEmpty = document.getElementById('documents-empty');
            const modalProjectName = document.getElementById('modal-project-name');

            // Show modal
            modal.style.display = 'block';
            modalProjectName.textContent = `📄 Dokumen: ${projectName}`;

            // Reset state
            documentsList.innerHTML = '';
            documentsEmpty.style.display = 'none';
            documentsLoading.style.display = 'block';

            try {
                const response = await apiRequest(`/api/projects/${projectId}/documents`);

                documentsLoading.style.display = 'none';

                if (response.success && response.data) {
                    const documents = response.data.documents || [];

                    if (documents.length === 0) {
                        documentsEmpty.style.display = 'block';
                    } else {
                        renderDocuments(documents);
                    }
                } else {
                    documentsList.innerHTML = `
                        <div class="documents-error">
                            <p>Gagal memuat dokumen: ${escapeHtml(response.message || 'Unknown error')}</p>
                        </div>
                    `;
                }
            } catch (error) {
                documentsLoading.style.display = 'none';
                documentsList.innerHTML = `
                    <div class="documents-error">
                        <p>Error: ${escapeHtml(error.message)}</p>
                    </div>
                `;
            }
        }

        // Render documents list
        function renderDocuments(documents) {
            const documentsList = document.getElementById('documents-list');

            const headerHtml = `
                <div class="document-header">
                    <div style="width: 50px;">No</div>
                    <div style="flex: 1;">Judul & Preview</div>
                    <div style="width: 80px;">Tokens</div>
                    <div style="width: 80px;">URL</div>
                </div>
            `;

            const rowsHtml = documents.map((doc, index) => `
                <div class="document-row">
                    <div class="document-number">${index + 1}</div>
                    <div class="document-content">
                        <div class="document-title">${escapeHtml(doc.title || 'No title')}</div>
                        ${doc.content_preview ? `<div class="document-preview">${escapeHtml(doc.content_preview)}</div>` : ''}
                    </div>
                    <div class="document-tokens">
                        ${doc.tokens_count || (doc.tokens && doc.tokens.length) || 0}
                    </div>
                    <div class="document-url-cell">
                        ${doc.url
                            ? `<a href="${escapeHtml(doc.url)}" target="_blank" class="document-url">🔗 Link</a>`
                            : '-'}
                    </div>
                </div>
            `).join('');

            documentsList.innerHTML = headerHtml + rowsHtml;
        }

        // Close documents modal
        function closeDocumentsModal() {
            const modal = document.getElementById('documents-modal');
            modal.style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('documents-modal');
            if (event.target === modal) {
                closeDocumentsModal();
            }
        }

        // Delete project with confirmation
        async function deleteProject(projectId, projectName) {
            const confirmMsg = `Anda yakin ingin menghapus "${projectName}"?\n\nAksi ini akan menghapus:\n- Database records\n- Model files\n- Semua data terkait\n\nAksi tidak dapat dibatalkan.`;

            if (!confirm(confirmMsg)) {
                return;
            }

            const container = document.getElementById('projects-table');
            const row = container.querySelector(`.project-row[data-id="${projectId}"]`);
            const button = row?.querySelector('.btn-delete');

            if (button) {
                button.disabled = true;
                button.textContent = '⏳ Menghapus...';
            }

            try {
                const response = await apiRequest(`/api/projects/${projectId}/delete`, {
                    method: 'DELETE'
                });

                if (response.success) {
                    // Animate row removal
                    if (row) {
                        row.style.opacity = '0';
                        row.style.transform = 'translateX(-20px)';
                        setTimeout(() => {
                            row.remove();
                            // Check if table is empty
                            const remainingRows = container.querySelectorAll('.project-row');
                            if (remainingRows.length === 0) {
                                renderProjectsTable([]);
                            }
                        }, 300);
                    }
                } else {
                    if (button) {
                        button.disabled = false;
                        button.textContent = '🗑️ Hapus';
                    }
                    alert(`Gagal menghapus project: ${escapeHtml(response.message)}`);
                }
            } catch (error) {
                if (button) {
                    button.disabled = false;
                    button.textContent = '🗑️ Hapus';
                }
                alert(`Error: ${escapeHtml(error.message)}`);
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) {
                loadProjects();
            }
        });
    </script>

    <style>
        .page-header {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            margin-bottom: var(--space-6);
            box-shadow: var(--shadow-sm);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: var(--space-4);
        }

        .header-content h1 {
            margin: 0;
            color: var(--primary);
            font-size: 1.75rem;
        }

        .header-actions {
            display: flex;
            gap: var(--space-3);
        }

        .projects-section {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            box-shadow: var(--shadow-sm);
        }

        .projects-table {
            min-height: 200px;
        }

        .projects-loading,
        .projects-empty,
        .projects-error {
            text-align: center;
            padding: var(--space-8);
            color: var(--text-muted);
        }

        .projects-error {
            color: var(--error);
        }

        .project-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr 140px;
            gap: var(--space-4);
            padding: var(--space-4);
            background: var(--bg-card);
            border-radius: var(--radius-md);
            font-weight: 600;
            color: var(--text-secondary);
        }

        .project-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr 140px;
            gap: var(--space-4);
            padding: var(--space-4);
            border-bottom: 1px solid var(--border-color);
            align-items: center;
            transition: all var(--transition-normal);
        }

        .project-row:last-child {
            border-bottom: none;
        }

        .project-row:hover {
            background: var(--bg-card-hover);
        }

        .project-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .project-description {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: var(--space-1);
        }

        .project-stat {
            text-align: center;
        }

        .project-stat-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        .project-stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .project-status {
            display: inline-block;
            padding: var(--space-1) var(--space-3);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .project-status.active {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
        }

        .project-status.deleted {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid var(--error);
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 500;
            transition: all var(--transition-normal);
        }

        .btn-delete:hover:not(:disabled) {
            background: var(--error);
            color: white;
        }

        .btn-delete:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-refresh {
            background: var(--primary);
            color: white;
            border: none;
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 500;
            transition: all var(--transition-normal);
        }

        .btn-refresh:hover {
            background: var(--primary-dark);
        }

        .btn-view-docs {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid #3b82f6;
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 500;
            transition: all var(--transition-normal);
            font-size: 0.875rem;
        }

        .btn-view-docs:hover {
            background: #3b82f6;
            color: white;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.85);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: var(--bg-card);
            margin: 5% auto;
            padding: 0;
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 1200px;
            max-height: 80vh;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-6);
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h2 {
            margin: 0;
            color: var(--primary);
            font-size: 1.5rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 2rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-md);
            transition: all var(--transition-normal);
        }

        .modal-close:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .modal-body {
            padding: var(--space-6);
            overflow-y: auto;
            flex: 1;
        }

        .documents-loading,
        .documents-empty,
        .documents-error {
            text-align: center;
            padding: var(--space-8);
            color: var(--text-muted);
        }

        .documents-error {
            color: var(--error);
        }

        .document-header {
            display: flex;
            gap: var(--space-4);
            padding: var(--space-4);
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            font-weight: 600;
            color: var(--text-secondary);
            position: sticky;
            top: 0;
            align-items: center;
        }

        .document-row {
            display: flex;
            gap: var(--space-4);
            padding: var(--space-4);
            border-bottom: 1px solid var(--border-color);
            align-items: start;
            transition: all var(--transition-normal);
        }

        .document-row:hover {
            background: var(--bg-card-hover);
        }

        .document-row:last-child {
            border-bottom: none;
        }

        .document-title {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: var(--space-1);
        }

        .document-content {
            flex: 1;
            min-width: 0;
        }

        .document-preview {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .document-tokens {
            width: 80px;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .document-url-cell {
            width: 80px;
            text-align: center;
        }

        .document-number {
            font-weight: 600;
            color: var(--text-muted);
            text-align: center;
        }

        .topic-badge {
            display: inline-block;
            padding: var(--space-1) var(--space-3);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .topic-badge.topic-none {
            background: var(--bg-secondary);
            color: var(--text-muted);
        }

        .topic-badge.topic-0 {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .topic-badge.topic-1 {
            background: rgba(249, 115, 22, 0.1);
            color: #f97316;
        }

        .topic-badge.topic-2 {
            background: rgba(234, 179, 8, 0.1);
            color: #eab308;
        }

        .topic-badge.topic-3 {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
        }

        .topic-badge.topic-4 {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }

        .topic-badge.topic-5 {
            background: rgba(168, 85, 247, 0.1);
            color: #a855f7;
        }

        .topic-badge.topic-6 {
            background: rgba(236, 72, 153, 0.1);
            color: #ec4899;
        }

        .topic-badge.topic-7 {
            background: rgba(20, 184, 166, 0.1);
            color: #14b8a6;
        }

        .topic-badge.topic-8 {
            background: rgba(100, 116, 139, 0.1);
            color: #64748b;
        }

        .topic-badge.topic-9 {
            background: rgba(139, 92, 246, 0.1);
            color: #8b5cf6;
        }

        .document-url {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.875rem;
        }

        .document-url:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .project-header,
            .project-row {
                grid-template-columns: 1fr;
                gap: var(--space-2);
            }

            .project-header {
                display: none;
            }

            .project-row {
                border: 1px solid var(--border-color);
                border-radius: var(--radius-md);
                padding: var(--space-4);
                margin-bottom: var(--space-3);
            }

            .document-header,
            .document-row {
                flex-direction: column;
                gap: var(--space-2);
            }

            .document-header {
                display: none;
            }

            .document-row {
                border: 1px solid var(--border-color);
                border-radius: var(--radius-md);
                padding: var(--space-4);
                margin-bottom: var(--space-3);
            }

            .document-number {
                display: none;
            }

            .document-tokens,
            .document-url-cell {
                width: 100%;
                text-align: left;
            }

            .modal-content {
                width: 95%;
                margin: 2% auto;
                max-height: 90vh;
            }
        }
    </style>
</body>
</html>
